<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="container">
        <form id="myForm">
            <h2>Register here</h2>
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Please enter your name">
                <small id="nameError" class="error"></small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Please enter your email">
                <small id="emailError" class="error"></small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Please enter your password">
                <small id="passwordError" class="error"></small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Please re-enter your password">
                <small id="confirmError" class="error"></small>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>
    <script src="form.js"></script>
</body>
</html>
